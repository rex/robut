# vibe-defaults.yaml — agentic-skeleton's hydration source.
#
# This file holds the canonical defaults for every skeleton-owned field.
# When a repo's VIBE.yaml omits a field, the validator hydrates it from
# here before applying further policy.
#
# DO NOT EDIT this file in a target repo. To override a default, set the
# explicit value in the repo's VIBE.yaml. To change the default itself,
# edit this file in the agentic-skeleton skill.
#
# Schema:  agentic-skeleton/references/vibe-yaml-schema.md
# Cascade: skeleton defaults (here) → composable-skill defaults →
#          repo VIBE.yaml → CLI flags

kind: vibe-policy
schema_version: 1

project:
  name: unknown
  lifecycle: brownfield
  stack: unknown
  decisions: []

workflow:
  default_autonomy_mode: interactive
  default_slice_completion_behavior: commit-push-and-pause
  allowed_stop_conditions:
    - hard_blocker
    - explicit_user_pause
    - irreversible_user_decision_required
    - missing_required_access
  explicit_user_directives_override_skill_defaults: true
  record_standing_user_directives_in_task_state: true
  changelog_required: true
  commit_per_logical_step: true
  signed_commits_required: true
  push_after_each_commit_if_remote_exists: true
  validation_command: make validate
  final_verification_command: make check-if-the-agent-can-consider-this-task-completed
  ask_before_dockerizing: true

quality_gates:
  lint:
    required: true
    command: make lint
  typecheck:
    required: true
    command: make typecheck
  tests:
    mode: deferred
    command: null
    required_suites: []
    require_test_updates_for_all_code_changes: false
    coverage:
      enabled: false
      command: null
      minimum_percentage: null
      measurement: line
      enforcement_scope: overall
  clean_worktree_required_on_completion: true

architecture:
  check_command: make check-architecture
  # Empty = OPT-OUT: the architecture gate scans every source file in the
  # repo (minus exclude_globs). A repo sets scope_globs only to NARROW the
  # scan; a scope_globs that matches zero files fails the gate.
  scope_globs: []
  exclude_globs:
    - "**/*.generated.*"
    - "**/node_modules/**"
    - "**/.next/**"
  max_lines_per_file:
    soft: 250
    hard: 400
  max_public_functions_per_module: 8
  prefer_packages_over_domain_files: true

docs:
  agents_md_required: true
  claude_md_required: true
  task_state_required: true
  vibe_yaml_required: true

reporting:
  intermediate_updates:
    commentary_only_when_autonomous: true
  completion_report:
    required: true
    heading: Completion Report
    format: markdown-table
    detail_level: compact
    version_command: null
    include_fields:
      - commit
      - git_status
      - version
      - final_verification
      - architecture
      - lint
      - typecheck
      - tests
      - coverage
      - waivers
    parse_counts_when_available: true
    include_not_applicable_fields: true
    omit_empty_fields: true
    include_raw_output_when: failures-or-dirty
    prefer_normalized_fields_over_raw_output: true

security:
  secrets_in_files: forbidden  # pragma: allowlist secret

versioning:
  enabled: true
  style: semver
  file: VERSION
  initial: "0.1.0"
  bump_required_per_commit: true
  bootstrap_exempt: true
  changelog_path: CHANGELOG.md
  tag_prefix: "v"
  tag_on_release: true

# Applied-skill provenance — default empty; populated by scripts/stamp_skill.py.
skills: []
